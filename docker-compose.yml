services:
  postgres:
    image: postgres:17
    container_name: beta-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: beta
      POSTGRES_PASSWORD: beta
      POSTGRES_DB: beta
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U beta"]
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
